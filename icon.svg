<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.25" />
    </filter>
    
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="115" fill="#1976D2" />

  <g filter="url(#shadow)">
    <g stroke="#E3F2FD" stroke-width="24" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8">
      <path d="M 210 144 L 144 144 L 144 210" />
      <path d="M 302 144 L 368 144 L 368 210" />
      <path d="M 210 368 L 144 368 L 144 302" />
      <path d="M 302 368 L 368 368 L 368 302" />
    </g>

    <rect x="180" y="180" width="20" height="152" rx="4" fill="#FFFFFF" />
    <rect x="216" y="180" width="8"  height="152" rx="4" fill="#FFFFFF" />
    <rect x="240" y="180" width="28" height="152" rx="4" fill="#FFFFFF" />
    <rect x="284" y="180" width="12" height="152" rx="4" fill="#FFFFFF" />
    <rect x="312" y="180" width="20" height="152" rx="4" fill="#FFFFFF" />
  </g>

  <rect x="110" y="250" width="292" height="12" rx="6" fill="#FF5252" filter="url(#glow)" />
</svg>
